<!DOCTYPE html>
<html>
<head>
    <title>All Bookings</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial;
            background: #f4f4f4;
        }

        .top {
            height: 125px;
            background: rgb(23,35,51);
            color: white;
            position: relative;
        }

        .logo {
            position: absolute;
            left: 40px;
            top: 45px;
            font-size: 28px;
            font-weight: bold;
        }

        .main {
            padding: 40px;
        }

        .title {
            width: 320px;
            height: 70px;
            background: #8ec9f5;
            border: 4px solid #1e293b;
            text-align: center;
            line-height: 70px;
            font-size: 32px;
            font-weight: bold;
            margin: -40px auto 30px auto;
        }

        table {
            width: 95%;
            margin: auto;
            border-collapse: collapse;
            background: white;
            box-shadow: 3px 3px 8px gray;
        }

        th {
            background: #8ec9f5;
            border: 2px solid #1e293b;
            padding: 10px;
        }

        td {
            border: 2px solid #1e293b;
            padding: 8px;
            text-align: center;
        }

        .delete-btn {
            background: red;
            color: white;
            border: none;
            padding: 6px 15px;
            cursor: pointer;
        }

        .back {
            display: block;
            margin: 20px auto;
            text-align: center;
            font-size: 20px;
            text-decoration: none;
            font-weight: bold;
            color: #1e293b;
        }
    </style>
</head>

<body>

<div class="top">
    <div class="logo">PLAZA HOTEL</div>
</div>

<div class="main">
    <div class="title">All Bookings</div>

    <table>
        <tr>
            <th>User</th>
            <th>Name</th>
            <th>Room Type</th>
            <th>Capacity</th>
            <th>Check In</th>
            <th>Check Out</th>
            <th>Room ID</th>
            <th>Action</th>
        </tr>

        <tr th:each="b : ${bookings}">
            <td th:text="${b.username}"></td>
            <td th:text="${b.name}"></td>
            <td th:text="${b.roomType}"></td>
            <td th:text="${b.roomCapacity}"></td>
            <td th:text="${b.checkIn}"></td>
            <td th:text="${b.checkOut}"></td>
            <td th:text="${b.roomId}"></td>

            <td>
                <form action="/cancel-booking" method="get">
                    <input type="hidden" name="id" th:value="${b.id}">
                    <button class="delete-btn"
                        onclick="return confirm('Delete this booking?')">
                        Delete
                    </button>
                </form>
            </td>
        </tr>
    </table>

    <a class="back" href="/admin-dashboard">‹ Back</a>
</div>

</body>
</html>
