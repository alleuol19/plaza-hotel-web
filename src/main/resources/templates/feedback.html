<!DOCTYPE html>
<html>
<head>
    <title>Feedback</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f4f4f4;
        }

        .top {
            height: 125px;
            background: rgb(23, 35, 51);
            color: white;
            position: relative;
        }

        .logo {
            position: absolute;
            left: 40px;
            top: 45px;
            font-size: 28px;
            font-weight: bold;
        }

        .user {
            position: absolute;
            right: 50px;
            top: 35px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }

        .user a {
            color: white;
        }

        .main {
            padding: 50px;
        }

        .title {
            width: 300px;
            height: 70px;
            background: #8ec9f5;
            border: 4px solid #1e293b;
            box-shadow: 3px 3px 5px gray;
            text-align: center;
            line-height: 70px;
            font-size: 34px;
            font-weight: bold;
            font-style: italic;
            margin: -20px auto 35px auto;
        }

        .box {
            width: 500px;
            margin: auto;
            background: white;
            border: 4px solid #1e293b;
            padding: 25px;
        }

        label {
            font-size: 18px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            margin: 10px 0 20px 0;
            padding: 10px;
            box-sizing: border-box;
            font-size: 15px;
        }

        textarea {
            height: 140px;
            resize: none;
        }

        .submit {
            width: 120px;
            height: 45px;
            background: green;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .back {
            display: block;
            width: 120px;
            margin: 25px auto;
            text-align: center;
            color: #1e293b;
            font-size: 20px;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="top">
    <div class="logo">PLAZA HOTEL</div>

    <div class="user">
        👤 <span th:text="${username}">User</span><br>
        <a href="/login">Log Out</a>
    </div>
</div>

<div class="main">
    <div class="title">Feedback</div>

    <div class="box">
        <form action="/feedback" method="post">
            <label>Name</label>
            <input type="text" name="name" placeholder="Your name" required>

            <label>Rating</label>
            <select name="rating" required>
                <option value="">Select rating</option>
                <option value="5">5 - Excellent</option>
                <option value="4">4 - Good</option>
                <option value="3">3 - Average</option>
                <option value="2">2 - Poor</option>
                <option value="1">1 - Bad</option>
            </select>

            <label>Message</label>
            <textarea name="message" placeholder="Write your feedback here..." required></textarea>

            <button class="submit" type="submit">Submit</button>
        </form>
    </div>

    <a class="back" href="/user-dashboard">‹ Back</a>
</div>

</body>
</html>
