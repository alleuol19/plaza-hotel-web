<!DOCTYPE html>
<html>
<head>
    <title>Rooms</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f4f4f4;
        }

        .top {
            height: 125px;
            background: rgb(23, 35, 51);
            color: white;
            position: relative;
        }

        .logo {
            position: absolute;
            left: 40px;
            top: 45px;
            font-size: 28px;
            font-weight: bold;
        }

        .user {
            position: absolute;
            right: 50px;
            top: 35px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }

        .user a {
            color: white;
        }

        .main {
            padding: 40px;
        }

        .title {
            width: 300px;
            height: 70px;
            background: #8ec9f5;
            border: 4px solid #1e293b;
            box-shadow: 3px 3px 5px gray;
            text-align: center;
            line-height: 70px;
            font-size: 36px;
            font-weight: bold;
            font-style: italic;
            margin: -35px auto 25px auto;
        }

        table {
            width: 95%;
            margin: auto;
            border-collapse: collapse;
            background: white;
            box-shadow: 3px 3px 8px gray;
        }

        th {
            background: #e9e9e9;
            padding: 10px;
            border: 1px solid #ccc;
            font-weight: bold;
        }

        td {
            padding: 8px;
            border: 1px solid #ddd;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f7f7f7;
        }

        .back {
            display: block;
            margin: 25px auto;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #1e293b;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="top">
    <div class="logo">PLAZA HOTEL</div>

    <div class="user">
        👤 <span th:text="${username}">Admin</span><br>
        <a href="/login">Log Out</a>
    </div>
</div>

<div class="main">
    <div class="title">Rooms</div>

    <table>
        <tr>
            <th>ID</th>
            <th>Room Type</th>
            <th>Room Capacity</th>
            <th>Check-in Date</th>
            <th>Check-out Date</th>
            <th>Is Available?</th>
        </tr>

        <tr th:each="r : ${rooms}">
            <td th:text="${r.id}"></td>
            <td th:text="${r.roomType}"></td>
            <td th:text="${r.roomCapacity}"></td>
            <td th:text="${r.checkInDate}"></td>
            <td th:text="${r.checkOutDate}"></td>
            <td th:text="${r.available}"></td>
        </tr>
    </table>

    <a class="back" href="/admin-dashboard">‹ Back</a>
</div>

</body>
</html>
