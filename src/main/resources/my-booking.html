<!DOCTYPE html>
<html>
<head>
    <title>My Booking</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f4f4f4;
        }

        .top {
            height: 125px;
            background: rgb(23, 35, 51);
            color: white;
            position: relative;
        }

        .logo {
            position: absolute;
            left: 40px;
            top: 45px;
            font-size: 28px;
            font-weight: bold;
        }

        .user {
            position: absolute;
            right: 50px;
            top: 35px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }

        .user a {
            color: white;
        }

        .main {
            padding: 50px;
        }

        .title {
            width: 300px;
            height: 70px;
            background: #8ec9f5;
            border: 4px solid #1e293b;
            box-shadow: 3px 3px 5px gray;
            text-align: center;
            line-height: 70px;
            font-size: 34px;
            font-weight: bold;
            font-style: italic;
            margin: -20px auto 35px auto;
        }

        table {
            width: 85%;
            margin: auto;
            border-collapse: collapse;
            background: white;
            box-shadow: 3px 3px 8px gray;
        }

        th {
            background: #8ec9f5;
            border: 2px solid #1e293b;
            padding: 12px;
            font-size: 18px;
        }

        td {
            border: 2px solid #1e293b;
            padding: 10px;
            text-align: center;
            font-size: 16px;
        }

        .cancel-btn {
            background: red;
            color: white;
            border: none;
            padding: 8px 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .back {
            display: block;
            width: 120px;
            margin: 30px auto;
            text-align: center;
            color: #1e293b;
            font-size: 20px;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="top">
    <div class="logo">PLAZA HOTEL</div>

    <div class="user">
        👤 <span th:text="${username}">User</span><br>
        <a href="/login">Log Out</a>
    </div>
</div>

<div class="main">
    <div class="title">My Booking</div>

    <table>
        <tr>
            <th>Room Type</th>
            <th>Check In</th>
            <th>Check Out</th>
            <th>Room ID</th>
            <th>Action</th>
        </tr>

        <tr th:each="b : ${bookings}">
            <td th:text="${b.roomType}"></td>
            <td th:text="${b.checkIn}"></td>
            <td th:text="${b.checkOut}"></td>
            <td th:text="${b.roomId}"></td>

            <td>
                <form action="/cancel-booking" method="get">
                    <input type="hidden" name="id" th:value="${b.id}">
                    <button class="cancel-btn" type="submit"
                            onclick="return confirm('Cancel this booking?')">
                        Cancel
                    </button>
                </form>
            </td>
        </tr>
    </table>

    <a class="back" href="/user-dashboard">‹ Back</a>
</div>

</body>
</html>
