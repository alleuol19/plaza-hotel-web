<!DOCTYPE html>
<html>
<head>
    <title>Create Account</title>

    <style>
        body {
            margin: 0;
            background: white;
            font-family: "Segoe UI";
        }

        .window {
            width: 400px;
            height: 420px;
            margin: 30px auto;
            background: rgb(23, 35, 51);
            position: relative;
        }

        .title {
            position: absolute;
            top: 30px;
            left: 150px;
            color: white;
            font-size: 22px;
            font-weight: bold;
        }

        label {
            position: absolute;
            left: 90px;
            color: white;
            font-size: 12px;
        }

        .user-label { top: 80px; }
        .pass-label { top: 150px; }

        input {
            position: absolute;
            left: 90px;
            width: 220px;
            height: 30px;
        }

        .user-input { top: 100px; }
        .pass-input { top: 170px; }

        button {
            position: absolute;
            top: 240px;
            left: 90px;
            width: 220px;
            height: 40px;
            cursor: pointer;
        }

        .login {
            position: absolute;
            top: 300px;
            left: 70px;
            width: 260px;
            text-align: center;
            color: white;
            font-size: 12px;
            text-decoration: none;
        }

        .login span {
            color: cyan;
        }

        .message {
            position: absolute;
            top: 335px;
            width: 100%;
            text-align: center;
            color: red;
            font-size: 12px;
        }
    </style>
</head>

<body>

<div class="window">

    <div class="title">SIGN UP</div>

    <form action="/signup" method="post">
        <label class="user-label">Choose Username:</label>
        <input class="user-input" type="text" name="username" required>

        <label class="pass-label">Choose Password:</label>
        <input class="pass-input" type="password" name="password" required>

        <button type="submit">CREATE ACCOUNT</button>
    </form>

    <a class="login" href="/login">
        Already have an account? <span>Login</span>
    </a>

    <p class="message" th:text="${message}"></p>

</div>

</body>
</html>
