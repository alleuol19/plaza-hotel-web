<!DOCTYPE html>
<html>
<head>
    <title>Plaza Hotel - Login</title>

    <style>
        body {
            margin: 0;
            background: white;
            font-family: "Segoe UI";
        }

        .window {
            width: 400px;
            height: 450px;
            margin: 20px auto;
            background: rgb(23, 35, 51);
            position: relative;
        }

        .title {
            position: absolute;
            top: 40px;
            left: 90px;
            color: white;
            font-size: 26px;
            font-weight: bold;
        }

        label {
            position: absolute;
            left: 90px;
            color: white;
            font-size: 12px;
        }

        .user-label { top: 120px; }
        .pass-label { top: 190px; }

        input {
            position: absolute;
            left: 90px;
            width: 220px;
            height: 30px;
        }

        .user-input { top: 140px; }
        .pass-input { top: 210px; }

        button {
            position: absolute;
            top: 280px;
            left: 90px;
            width: 220px;
            height: 40px;
            cursor: pointer;
        }

        .signup {
            position: absolute;
            top: 340px;
            left: 70px;
            width: 260px;
            text-align: center;
            color: white;
            font-size: 12px;
            text-decoration: none;
        }

        .signup span {
            color: cyan;
        }

        .error {
            position: absolute;
            top: 370px;
            width: 100%;
            text-align: center;
            color: red;
            font-size: 12px;
        }
    </style>
</head>

<body>

<div class="window">

    <div class="title">PLAZA HOTEL</div>

    <form action="/login" method="post">
        <label class="user-label">Username:</label>
        <input class="user-input" type="text" name="username">

        <label class="pass-label">Password:</label>
        <input class="pass-input" type="password" name="password">

        <button type="submit">LOGIN</button>
    </form>

    <a class="signup" href="/signup">
        Don't have an account? <span>Sign Up</span>
    </a>

    <p class="error" th:text="${error}"></p>

</div>

</body>
</html>
