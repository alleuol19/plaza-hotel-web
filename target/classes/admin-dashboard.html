<!DOCTYPE html>
<html>
<head>
    <title>Hotel Reservation System</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f4f4f4;
        }

        .top {
            height: 125px;
            background: rgb(23, 35, 51);
            color: white;
            position: relative;
        }

        .logo {
            position: absolute;
            left: 35px;
            top: 35px;
            font-size: 28px;
            font-weight: bold;
        }

        .settings {
            position: absolute;
            right: 40px;
            top: 45px;
            font-size: 26px;
            font-weight: bold;
        }

        .side {
            position: absolute;
            top: 125px;
            left: 0;
            width: 170px;
            height: calc(100vh - 125px);
            background: #8ec9f5;
            border-right: 2px solid #1e293b;
        }

        .profile {
            margin: 25px 12px;
            padding: 15px;
            border: 2px solid #1e293b;
            background: #bde3ff;
            font-size: 13px;
        }

        .circle-box {
            margin: 35px 12px;
            padding: 15px;
            border: 2px solid #1e293b;
            background: #bde3ff;
            text-align: center;
        }

        .circle {
            width: 80px;
            height: 80px;
            background: #0ea5e9;
            border-radius: 50%;
            margin: auto;
        }

        .logout {
            margin-left: 35px;
            margin-top: 25px;
            font-size: 18px;
            color: #1e293b;
            text-decoration: none;
        }

        .main {
            margin-left: 170px;
            padding-top: 70px;
            position: relative;
        }

        .home-title {
            position: absolute;
            top: -45px;
            left: 190px;
            width: 300px;
            height: 70px;
            background: #8ec9f5;
            border: 4px solid #1e293b;
            box-shadow: 3px 3px 5px gray;
            text-align: center;
            line-height: 70px;
            font-size: 36px;
            font-weight: bold;
            font-style: italic;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 240px);
            gap: 70px 35px;
            justify-content: center;
            margin-top: 20px;
        }

        .card {
            height: 160px;
            background: #8ec9f5;
            box-shadow: 3px 3px 8px gray;
            border: none;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        .icon {
            display: block;
            font-size: 50px;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<div class="top">
    <div class="logo">PLAZA HOTEL</div>
    <div class="settings">⚙ Settings</div>
</div>

<div class="side">
    <div class="profile">

    </div>

    <div class="circle-box">
        <div class="circle"></div>
        <p>99%</p>
        <button>Available Rooms</button>
    </div>

    <div class="circle-box">
        <div class="circle" style="background:white;"></div>
        <p>1%</p>
        <button>Reserved Rooms</button>
    </div>

    <a class="logout" href="/login">🔴 Log Out</a>
</div>

<div class="main">
    <div class="home-title">Home Page</div>

    <div class="grid">
        <button class="card"><span class="icon">🏨</span>Check In</button>
        <button class="card"><span class="icon">📋</span>Room Booking</button>
        <button class="card"><span class="icon">🛏️</span>Rooms</button>
        <button class="card"><span class="icon">🏨</span>Check Out</button>
        <button class="card"><span class="icon">❌</span>Cancel Booking</button>
        <button class="card"><span class="icon">👥</span>Guests</button>
    </div>
</div>

</body>
</html>
